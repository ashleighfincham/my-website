<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashify | Client Login</title>

    <link rel="icon" type="image/png" href="../favicon.png">

  <style>
    :root {
      --brand: #0b2a4a;
      --light: #f8fafc;
      --radius: 20px;
      --shadow: 0 20px 40px rgba(0,0,0,0.05);
    }

    body {
      font-family: Inter, sans-serif;
      background: var(--light);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .login-card {
      background: white;
      padding: 50px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 450px;
      text-align: center;
    }

    h1 {
      color: var(--brand);
      margin-bottom: 10px;
    }

    p {
      color: #64748b;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
    }

    button:hover {
      opacity: 0.95;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--brand);
      text-decoration: none;
    }

    .login-button {
      width: 100%;
      padding: 14px;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
    }
    
    .return-button {
      display: block;
      width: 100%;
      margin-top: 15px;
      padding: 14px;
      background: transparent;
      color: var(--brand);
      border: 2px solid var(--brand);
      border-radius: 12px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      box-sizing: border-box;
      transition: 0.3s;
    }
    
    .return-button:hover {
      background: var(--brand);
      color: white;
    }

    .login-icon {
      width: 60px;
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 20px auto;
    }

    
  </style>

</head>

<body>

<div class="login-card">

  <img src="icon_login.png" alt="Login Icon" class="login-icon">

  <h1>Client Login</h1>

  <p>
    Enter your credentials to access your Dashify dashboards.
  </p>

<form>

  <input
    type="text"
    placeholder="Username"
    required>

  <input
    type="password"
    placeholder="Password"
    required>

<button type="submit" class="login-button">
  Login
</button>

<a href="/" class="return-button">
  Return to Dashify
</a>


  </div>

</body>

</html>
